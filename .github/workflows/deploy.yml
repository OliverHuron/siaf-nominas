name: Deploy a Producción — SIAF Nóminas

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, siaf]
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar dependencias del Servidor
        run: |
          cd server
          npm install --production

      - name: Construir Frontend (Client)
        run: |
          cd client
          npm install
          CI=false npm run build

      - name: Desplegar archivos con rsync
        run: |
          rsync -av --delete \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='node_modules' \
            --exclude='client/node_modules' \
            . /var/www/siaf-nominas/

      - name: Restaurar .env desde Backup (si no existe)
        run: |
          if [ ! -f /var/www/siaf-nominas/server/.env ]; then
            cp /var/www/.env.siaf-nominas /var/www/siaf-nominas/server/.env
            echo "⚠️ .env restaurado desde backup"
          fi
          
      - name: Ejecutar migraciones pendientes (nominas_db)
        run: |
          sudo -u postgres psql -c "CREATE TABLE IF NOT EXISTS migrations_log (filename TEXT PRIMARY KEY, executed_at TIMESTAMP DEFAULT NOW());" nominas_db

          for file in /var/www/siaf-nominas/database/migrations/*.sql; do
            filename=$(basename "$file")
            already_run=$(sudo -u postgres psql -tAc "SELECT COUNT(*) FROM migrations_log WHERE filename='$filename'" nominas_db)

            if [ "$already_run" -eq "0" ]; then
              echo "▶ Ejecutando migración: $filename"
              sudo -u postgres psql -d nominas_db -f "$file"
              sudo -u postgres psql -c "INSERT INTO migrations_log (filename) VALUES ('$filename')" nominas_db
              echo "✅ $filename ejecutada"
            else
              echo "⏭ $filename ya ejecutada, saltando"
            fi
          done
      - name: Reiniciar Servidor con PM2
        run: |
          cd /var/www/siaf-nominas/server
          pm2 restart siaf-nominas --update-env || pm2 start src/index.js --name "siaf-nominas"
          pm2 save
          echo "🚀 Despliegue finalizado con éxito"